<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Pages</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9fafb;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --border: #334155;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --accent: #818cf8;
        --accent-hover: #a5b4fc;
      }
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 2rem 1.5rem 1rem;
      max-width: 960px;
      margin: 0 auto;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 0.5rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .card-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
    }

    .card p {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-link {
      font-size: 0.8rem;
      color: var(--accent);
      margin-top: auto;
      padding-top: 0.5rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Pages</h1>
    <p>公開しているWebアプリ一覧</p>
  </header>
  <main>
    <div class="grid">
      <a href="./qiita-ai/" class="card">
        <div class="card-icon">🤖</div>
        <h2>QiitaAI Watch</h2>
        <p>QiitaのAI・機械学習・LLM関連記事をまとめて閲覧できるサービス</p>
        <span class="card-link">開く →</span>
      </a>
      <a href="./puzzle-app/" class="card">
        <div class="card-icon">🧩</div>
        <h2>かたちパズル</h2>
        <p>形を合わせて空間認識力を鍛える！4歳から遊べる知育パズルゲーム</p>
        <span class="card-link">開く →</span>
      </a>
    </div>
  </main>
</body>
</html>
