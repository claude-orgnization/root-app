name: Claude Issue to PR

on:
  issues:
    types: [assigned]        # Issueをアサインしたとき
  issue_comment:
    types: [created]         # コメントで @claude を呼んだとき

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
```

---

### 3. 使い方

セットアップ後、Issueのコメントに以下のように書くだけ：
```
@claude このIssueを実装してPRを作成してください