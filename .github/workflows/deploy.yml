name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qiita-ai/package-lock.json

      - name: Install dependencies
        working-directory: qiita-ai
        run: npm ci

      - name: Build
        working-directory: qiita-ai
        run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/qiita-ai
          cp index.html deploy/index.html
          cp -r qiita-ai/dist/. deploy/qiita-ai/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
