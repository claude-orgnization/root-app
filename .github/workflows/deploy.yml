name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qiita-ai/package-lock.json

      - name: Install dependencies
        working-directory: qiita-ai
        run: npm ci

      - name: Build
        working-directory: qiita-ai
        run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/qiita-ai
          cp index.html deploy/index.html
          cp -r qiita-ai/dist/. deploy/qiita-ai/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
